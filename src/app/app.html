<nav style="
  display:flex;
  gap:0.75rem;
  align-items:center;
  padding:1rem 1.25rem;
  margin-bottom:1.5rem;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:12px;
  font-family:system-ui, -apple-system, sans-serif;
">
  <a routerLink="/transactions/new"
     style="
       display:inline-flex;
       align-items:center;
       gap:0.4rem;
       padding:0.5rem 1rem;
       background:#2563eb;
       color:#fff;
       text-decoration:none;
       border-radius:8px;
       font-size:0.9rem;
       font-weight:600;
       transition:background 0.2s ease;
     "
     onmouseover="this.style.background='#1d4ed8'"
     onmouseout="this.style.background='#2563eb'">
    ➕ Nueva transacción
  </a>

  <!-- ejemplo para ver la cuenta con id 1; cámbialo a cualquier id que quieras -->
  <a [routerLink]="['/accounts', 1]"
     style="
       display:inline-flex;
       align-items:center;
       gap:0.4rem;
       padding:0.5rem 1rem;
       background:#fff;
       color:#2563eb;
       border:1px solid #2563eb;
       text-decoration:none;
       border-radius:8px;
       font-size:0.9rem;
       font-weight:600;
       transition:all 0.2s ease;
     "
     onmouseover="this.style.background='#eff6ff'"
     onmouseout="this.style.background='#fff'">
    Ver cuenta
  </a>
</nav>

<router-outlet />
